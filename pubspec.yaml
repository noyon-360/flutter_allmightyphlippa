name: flutter_almightyflippa
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  get: ^4.7.3
  flutx_core: ^1.1.1+1
  shimmer: ^3.0.0
  file_picker: ^10.3.8
  pin_code_fields: ^8.0.1
  image_picker: ^1.2.1

  # Network and cache
  hive: ^2.2.3
